name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu:latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Linting
        run: |
          ruff format --check .
          ruff check .
      
      - name: Unit-test
        run: |
          pytest tests/unit \
          --cov=src \
          --cov-report=term-missing
      
      - name: Integration-test
        run: |
          pytest tests/integration \
          --cov=src \
          --cov-append \
          --cov-report=term-missing
      
